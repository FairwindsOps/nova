version: 2.1

orbs:
  rok8s: fairwinds/rok8s-scripts@14
  oss-docs: fairwinds/oss-docs@0

references:
  install_vault: &install_vault
    run:
      name: install hashicorp vault
      command: |
        apk --update add curl yq
        cd /tmp
        curl -LO https://releases.hashicorp.com/vault/1.13.2/vault_1.13.2_linux_amd64.zip
        sha256sum vault_1.13.2_linux_amd64.zip | grep f7930279de8381de7c532164b4a4408895d9606c0d24e2e9d2f9acb5dfe99b3c
        unzip vault_1.13.2_linux_amd64.zip
        mv vault /usr/bin/vault
  install_vault_machine: &install_vault_machine
    run:
      name: install hashicorp vault
      command: |
        sudo apt-get update -y && sudo apt-get install -y curl unzip
        cd /tmp
        curl -LO https://releases.hashicorp.com/vault/1.13.2/vault_1.13.2_linux_amd64.zip
        echo 'f7930279de8381de7c532164b4a4408895d9606c0d24e2e9d2f9acb5dfe99b3c  vault_1.13.2_linux_amd64.zip' | sha256sum -c
        unzip -o vault_1.13.2_linux_amd64.zip
        sudo mv vault /usr/bin/vault
  setup_qemu_binfmt: &setup_qemu_binfmt
    run:
      name: Setup QEMU for multi-arch Docker builds
      command: |
        sudo apt-get update -y
        sudo apt-get install -y qemu-user-static binfmt-support
        docker buildx create --use || true
        docker buildx inspect --bootstrap
jobs:
  test:
    docker:
      - image: cimg/go:1.26.0
    steps:
      - checkout
      - run:
          name: lint
          command: |
            echo "installing golint"
            go install golang.org/x/lint/golint@latest
            echo "linting..."
            golint -set_exit_status ./... | tee golint-report.out
            echo "checking go fmt..."
            if ! test -z $(go fmt ./...); then
              echo "Please run go fmt ./... to format your code"
              exit 1
            fi
      - run:
          name: test
          command: |
            go test -v --bench --benchmem -coverprofile=coverage.txt -covermode=atomic ./pkg/...
            go vet 2> govet-report.out
            go tool cover -html=coverage.txt -o cover-report.html
  snapshot:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser snapshot
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/workspace" -w /workspace \
              -e CIRCLE_SHA1 -e CIRCLE_BRANCH -e CIRCLE_TAG \
              goreleaser/goreleaser:v2.14.0 --snapshot
      - store_artifacts:
          path: dist
          destination: snapshot
  release:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    shell: /bin/bash
    steps:
      - checkout
      - *install_vault_machine
      - rok8s/get_vault_env:
          vault_path: repo/global/env
      - rok8s/docker_login:
          registry: "quay.io"
          username: $FAIRWINDS_QUAY_USER
          password-variable: FAIRWINDS_QUAY_TOKEN
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser release
          command: |
            export GORELEASER_CURRENT_TAG="${CIRCLE_TAG}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/workspace" -w /workspace \
              -e GORELEASER_CURRENT_TAG -e CIRCLE_TAG -e CIRCLE_SHA1 \
              goreleaser/goreleaser:v2.14.2
workflows:
  version: 2
  test_and_build:
    jobs:
      - test
      - snapshot:
          requires:
            - test
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
  release:
    jobs:
      - oss-docs/publish-docs:
          repository: nova
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^.*/
      - release:
          context: org-global
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /.*/
