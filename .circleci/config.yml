version: 2.1

orbs:
  rok8s: fairwinds/rok8s-scripts@14
  oss-docs: fairwinds/oss-docs@0

references:
  install_vault_machine: &install_vault_machine
    run:
      name: install hashicorp vault
      command: |
        sudo apt-get update -y && sudo apt-get install -y curl unzip
        cd /tmp
        curl -LO https://releases.hashicorp.com/vault/1.21.4/vault_1.21.4_linux_amd64.zip
        echo '889b681990fe221b884b7932fa9c9dd0ee9811b9349554f1aa287ab63c9f3dae  vault_1.21.4_linux_amd64.zip' | sha256sum -c
        unzip -o vault_1.21.4_linux_amd64.zip
        sudo mv vault /usr/bin/vault
  setup_qemu_binfmt: &setup_qemu_binfmt
    run:
      name: Setup QEMU for multi-arch Docker builds
      command: |
        sudo apt-get update -y
        sudo apt-get install -y qemu-user-static binfmt-support
        docker buildx create --use || true
        docker buildx inspect --bootstrap
jobs:
  test:
    docker:
      - image: cimg/go:1.26.2
    steps:
      - checkout
      - run:
          name: lint
          command: |
            echo "installing golint"
            go install golang.org/x/lint/golint@latest
            echo "linting..."
            golint -set_exit_status ./... | tee golint-report.out
            echo "checking go fmt..."
            if ! test -z $(go fmt ./...); then
              echo "Please run go fmt ./... to format your code"
              exit 1
            fi
      - run:
          name: test
          command: |
            go test -v --bench --benchmem -coverprofile=coverage.txt -covermode=atomic ./pkg/...
            go vet 2> govet-report.out
            go tool cover -html=coverage.txt -o cover-report.html
  snapshot:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser snapshot
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/workspace" -w /workspace \
              -e CIRCLE_SHA1 \
              -e CIRCLE_BRANCH \
              -e CIRCLE_TAG \
              goreleaser/goreleaser:v2.15.4 release --snapshot --skip=sign
      - store_artifacts:
          path: dist
          destination: snapshot
  release:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    shell: /bin/bash
    steps:
      - checkout
      - *install_vault_machine
      - rok8s/get_vault_env:
          vault_path: repo/global/env
      - run:
          name: docker login
          command: |
            docker login -u _json_key -p "$(echo $GCP_ARTIFACTREADWRITE_JSON_KEY | base64 -d)" us-docker.pkg.dev
      - *setup_qemu_binfmt
      - run:
          name: Run GoReleaser release
          command: |
            export GORELEASER_CURRENT_TAG="${CIRCLE_TAG}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/workspace" -w /workspace \
              -v "${HOME}/.docker:/root/.docker" \
              -e GORELEASER_CURRENT_TAG \
              -e CIRCLE_TAG \
              -e CIRCLE_SHA1 \
              -e GO111MODULE=on \
              -e GITHUB_TOKEN \
              -e VAULT_ADDR \
              -e VAULT_TOKEN \
              goreleaser/goreleaser:v2.15.4 release
workflows:
  version: 2
  test_and_build:
    jobs:
      - test
      - snapshot:
          requires:
            - test
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
  release:
    jobs:
      - oss-docs/publish-docs:
          repository: nova
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^.*/
      - release:
          context: org-global
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /.*/
